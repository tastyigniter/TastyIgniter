## Pass requests that don't refer directly to files in the filesystem to index.php
location / {
    try_files $uri $uri/ /index.php?$query_string;
}

## Pass the PHP scripts to FastCGI server
location ~ ^/index.php {
    ## Write your FPM configuration here
}

## Whitelist
location ~ ^/favicon\.ico { try_files $uri /index.php; }
location ~ ^/sitemap\.xml { try_files $uri /index.php; }

## Block all dotfiles except well-known (site-wide)
location ~ /\.(?!well-known).* {
    deny all;
}

## ---------------------------------------------------------------------------
## Storage hardening (public storage symlink: storage/app/public)
## ---------------------------------------------------------------------------

## Block script-like extensions anywhere under /storage/
location ~ ^/storage/.*\.(php|php\d*|phtml|phar|cgi|pl|py|asp|aspx|sh)$ {
    deny all;
}

## Block dotfiles anywhere under /storage/ (.env, .htaccess, etc.)
## Allows normal files like photo.jpg
location ~ ^/storage/(?:.*/)?\.[^/]+$ {
    deny all;
}

## Uploads: static only, no directory listing, no PHP fallback
location ^~ /storage/media/uploads/ {
    autoindex off;
    try_files $uri =404;
}

## Attachments: static only, no directory listing, no PHP fallback
location ^~ /storage/media/attachments/ {
    autoindex off;
    try_files $uri =404;
}

## Catch-all for other /storage/media/ paths (thumbs, etc.)
location ^~ /storage/media/ {
    autoindex off;
    try_files $uri =404;
}

## Catch-all for any other /storage/ paths outside media/
location ^~ /storage/ {
    autoindex off;
    try_files $uri =404;
}

## ---------------------------------------------------------------------------

### Let nginx return 404 if static file does not exist
location ~ ^/media {
    try_files $uri 404;
}

location ~ ^/themes/.*/assets {
    try_files $uri 404;
}
